name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]

jobs:
  python:
    name: Python tests & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check src tests
      - run: black --check src tests
      - run: mypy --strict src
      - run: bandit -r src functions --severity-level medium -q
      - run: pip-audit -r requirements.txt
        continue-on-error: true
      - run: pytest --tb=short -q --cov=src --cov-report=term-missing --cov-fail-under=65

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t stackradar:ci .

  email-function:
    name: Email function deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r functions/email/requirements.txt

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: echo "[]" > public/digest.json
      - run: npx vite build
