name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-function:
    name: Deploy Cloud Function
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Function
        run: |
          gcloud functions deploy git-release \
            --gen2 \
            --runtime=python312 \
            --region=us-central1 \
            --source=. \
            --entry-point=main \
            --trigger-http \
            --allow-unauthenticated \
            --service-account=git-release-sa@git-release-496817.iam.gserviceaccount.com \
            --memory=512MB \
            --timeout=300s \
            --project=git-release-496817

  deploy-frontend:
    name: Deploy Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull digest.json from R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: node scripts/build-digest.js

      - name: Inject R2 public URL
        run: |
          sed -i "s|REPLACE_WITH_R2_PUBLIC_URL|${{ secrets.R2_PUBLIC_URL }}|g" public/index.html

      - name: Build
        run: npx vite build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=git-release --commit-dirty=true
