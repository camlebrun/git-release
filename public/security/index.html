<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Security · StackRadar</title>
  <link rel="icon" type="image/png" href="/icon.png" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/security/style.css" />
</head>
<body>
  <header>
    <div class="header-row-1">
      <h1>📡 StackRadar</h1>
      <input type="search" id="search" placeholder="Search advisories…" autocomplete="off" />
    </div>

    <div class="header-row-2">
      <div class="tabs">
        <a class="tab" href="/">Release Notes <span class="badge" id="release-count"></span></a>
        <a class="tab active" href="/security/">Security <span class="badge badge-cve" id="total-count"></span></a>
        <a class="tab" href="/dbt-packages/">dbt Packages <span class="badge" id="pkg-count"></span></a>
        <a class="tab" href="/dbt-fusion/">dbt Fusion <span class="badge" id="fusion-count"></span></a>
      </div>

      <div class="divider"></div>

      <select id="action-filter" class="tag-select">
        <option value="all">All actions</option>
        <option value="patch-now">Patch now</option>
        <option value="patch-soon">Patch soon</option>
        <option value="monitor">Monitor</option>
        <option value="safe">Safe</option>
      </select>

      <select id="age-filter" class="tag-select">
        <option value="all">All dates</option>
        <option value="recent">Recent</option>
        <option value="old">Too old</option>
      </select>

      <select id="repo-filter" class="tag-select">
        <option value="all">All repos</option>
      </select>
    </div>
  </header>

  <main>
    <div class="pkg-rules-banner">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true" style="flex-shrink:0;margin-top:1px">
        <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 7v5M8 5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span>
        Advisories older than <strong>12 months</strong> are automatically downgraded to <strong>Safe</strong> unless critical.
      </span>
    </div>
    <div id="grid" class="bento-grid"></div>
    <p id="empty-state" class="empty-state hidden">No advisories match your filter.</p>
    <p id="loading" class="loading">Loading advisories…</p>
  </main>

  <!-- Detail drawer -->
  <div id="drawer-backdrop" class="drawer-backdrop hidden"></div>
  <aside id="drawer" class="drawer hidden" role="dialog" aria-modal="true">
    <div class="drawer-header">
      <div class="drawer-meta">
        <span id="drawer-repo" class="card-repo"></span>
        <span id="drawer-sev" class="sev"></span>
      </div>
      <button id="drawer-close" class="drawer-close" aria-label="Close">✕</button>
    </div>
    <div class="drawer-body">
      <div id="drawer-ids" class="advisory-ids" style="margin-bottom:8px"></div>
      <h2 id="drawer-title" class="drawer-title"></h2>
      <p id="drawer-date" class="card-date"></p>

      <div id="drawer-action-wrap" class="drawer-section hidden">
        <div id="drawer-action" class="advisory-action-banner"></div>
      </div>
      <div id="drawer-impact-wrap" class="drawer-section hidden">
        <h3 class="drawer-section-title">Impact</h3>
        <p id="drawer-impact" class="drawer-summary"></p>
      </div>
      <div id="drawer-versions-wrap" class="drawer-section hidden">
        <h3 class="drawer-section-title">Versions</h3>
        <p id="drawer-versions" class="card-date"></p>
      </div>
      <div id="drawer-steps-wrap" class="drawer-section hidden">
        <h3 class="drawer-section-title">Action steps</h3>
        <ul id="drawer-steps" class="card-changes drawer-changes"></ul>
      </div>
      <div id="drawer-desc-wrap" class="drawer-section hidden">
        <h3 class="drawer-section-title">Description</h3>
        <p id="drawer-desc" class="drawer-summary"></p>
      </div>
      <a id="drawer-link" class="drawer-link" target="_blank" rel="noopener">View on GitHub →</a>
    </div>
  </aside>

  <script type="module" src="/security/app.js"></script>
  <footer class="site-footer">Made by <a href="https://camillelebrun.fr" target="_blank" rel="noopener">Camille Lebrun</a></footer>
</body>
</html>
