<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#5b5fc7"/>
  <!-- Radar circles -->
  <circle cx="16" cy="16" r="12" stroke="white" stroke-width="1.2" stroke-opacity="0.3"/>
  <circle cx="16" cy="16" r="8"  stroke="white" stroke-width="1.2" stroke-opacity="0.5"/>
  <circle cx="16" cy="16" r="4"  stroke="white" stroke-width="1.2" stroke-opacity="0.8"/>
  <!-- Radar sweep line -->
  <line x1="16" y1="16" x2="25" y2="7" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Crosshairs -->
  <line x1="16" y1="4"  x2="16" y2="28" stroke="white" stroke-width="0.8" stroke-opacity="0.25"/>
  <line x1="4"  y1="16" x2="28" y2="16" stroke="white" stroke-width="0.8" stroke-opacity="0.25"/>
  <!-- Blip -->
  <circle cx="22" cy="10" r="2" fill="#a5f3fc"/>
</svg>
