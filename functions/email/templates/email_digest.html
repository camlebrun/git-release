<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StackRadar — Release Digest</title>
</head>
<body style="margin:0;padding:0;background:linear-gradient(135deg,#f5f3ff 0%,#ede9fe 100%);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <div style="max-width:600px;margin:0 auto;padding:32px 16px;">

    <!-- Header -->
    <div style="margin-bottom:28px;">
      <div style="margin-bottom:4px;">
        <span style="font-size:16px;font-weight:700;letter-spacing:-0.02em;background:linear-gradient(135deg,#5b5fc7 0%,#8b5cf6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
          ⬡ StackRadar
        </span>
      </div>
      <p style="margin:0;color:#6b7280;font-size:13px;">Release digest</p>
    </div>

    <!-- Title -->
    <h1 style="margin:0 0 6px;color:#111827;font-size:22px;font-weight:700;letter-spacing:-0.03em;">
      {{count}} new release{{count_plural}}
    </h1>
    <p style="margin:0 0 24px;color:#6b7280;font-size:13px;">
      New releases detected across your tracked repositories.
    </p>

    <div style="height:1px;background:rgba(139,92,246,0.15);margin-bottom:24px;"></div>

    <!-- Release cards -->
    {{cards}}

    <!-- Footer -->
    <div style="margin-top:28px;padding-top:20px;border-top:1px solid rgba(139,92,246,0.15);">
      <p style="margin:0;color:#9ca3af;font-size:11px;">
        Sent by StackRadar · You're receiving this because you're tracking releases.
      </p>
    </div>

  </div>
</body>
</html>
