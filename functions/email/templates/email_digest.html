<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StackRadar — Release Digest</title>
  <meta name="color-scheme" content="light only">
  <meta name="supported-color-schemes" content="light only">
</head>
<body style="margin:0;padding:0;background:#ede9fe;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <div style="background:linear-gradient(135deg,#f5f3ff 0%,#ede9fe 100%);min-height:100vh;">
  <div style="max-width:580px;margin:0 auto;padding:32px 20px 48px;">

    <!-- Header -->
    <div style="background:rgba(255,255,255,0.95);border-radius:12px;border:1px solid rgba(139,92,246,0.08);padding:14px 20px;margin-bottom:28px;">
      <table cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td style="vertical-align:middle;padding-right:8px;">
            <div style="width:28px;height:28px;background:linear-gradient(135deg,#5b5fc7 0%,#8b5cf6 100%);border-radius:7px;text-align:center;line-height:28px;font-size:14px;">
              <img src="{{icon_data_url}}" width="28" height="28" alt="📡" style="display:block;border-radius:7px;">
            </div>
          </td>
          <td style="vertical-align:middle;">
            <span style="font-size:17px;font-weight:700;letter-spacing:-0.02em;color:#5b5fc7;">StackRadar</span>
          </td>
        </tr>
      </table>
    </div>

    <!-- Title -->
    <h1 style="margin:0 0 4px;color:#111827;font-size:24px;font-weight:700;letter-spacing:-0.03em;">
      {{count}} new release{{count_plural}}
    </h1>
    <p style="margin:0 0 24px;color:#6b7280;font-size:13px;line-height:1.5;">
      New releases detected across your tracked repositories.
    </p>

    <!-- Release cards -->
    {{cards}}

    <!-- Footer -->
    <p style="margin:20px 0 0;color:#9ca3af;font-size:11px;text-align:center;">
      Sent by StackRadar &middot; You're receiving this because you're tracking releases.
    </p>

  </div>
  </div>
</body>
</html>
