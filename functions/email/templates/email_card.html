<div style="background:#ffffff;border-radius:20px;border:1px solid rgba(139,92,246,0.1);box-shadow:0 4px 20px rgba(0,0,0,0.06);padding:20px 24px 16px;margin-bottom:16px;">

  <!-- Card header -->
  <table cellpadding="0" cellspacing="0" border="0" width="100%">
    <tr>
      <td style="vertical-align:middle;">
        <span style="font-size:11px;font-weight:700;letter-spacing:0.03em;color:#8b5cf6;">{{repo_owner}}/</span><span style="font-size:15px;font-weight:700;color:#111827;">{{repo_name}}</span>
        <span style="font-size:12px;color:#9ca3af;margin-left:6px;">{{tag}}</span>
      </td>
      <td style="vertical-align:middle;text-align:right;white-space:nowrap;padding-left:12px;">
        <span style="background:{{sev_bg}};color:{{sev_fg}};padding:4px 12px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.03em;">{{severity}}</span>
      </td>
    </tr>
  </table>

  <!-- Summary -->
  <p style="margin:10px 0 14px;color:#6b7280;font-size:13px;line-height:1.5;">{{summary}}</p>

  <!-- Key changes -->
  {{changes_block}}

  <!-- Link -->
  <div style="margin-top:16px;padding-top:14px;border-top:1px solid rgba(139,92,246,0.1);">
    <a href="{{url}}" style="color:#8b5cf6;font-size:12px;font-weight:600;text-decoration:none;">
      View release &rarr;
    </a>
  </div>

</div>
