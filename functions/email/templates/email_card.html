<div style="background:white;border-radius:20px;border:1px solid rgba(139,92,246,0.12);box-shadow:0 1px 3px rgba(139,92,246,0.06);padding:20px 24px;margin-bottom:12px;">

  <!-- Card header -->
  <div style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;">
    <div>
      <span style="color:#6b7280;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;">{{repo_owner}}/</span><span style="color:#111827;font-size:14px;font-weight:600;">{{repo_name}}</span>
      <span style="color:#9ca3af;font-size:12px;margin-left:6px;">{{tag}}</span>
    </div>
    <span style="background:{{sev_bg}};color:{{sev_fg}};padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;">{{severity}}</span>
  </div>

  <!-- Summary -->
  <p style="margin:0 0 12px;color:#374151;font-size:13px;line-height:1.6;">{{summary}}</p>

  <!-- Key changes -->
  {{changes_block}}

  <!-- Link -->
  <div style="margin-top:14px;">
    <a href="{{url}}" style="color:#5b5fc7;font-size:12px;font-weight:500;text-decoration:none;">
      View release →
    </a>
  </div>

</div>
