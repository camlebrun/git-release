<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StackRadar — Release Digest</title>
</head>
<body style="margin:0;padding:0;background:#09090b;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <div style="max-width:600px;margin:0 auto;padding:32px 16px;">

    <!-- Header -->
    <div style="margin-bottom:28px;">
      <div style="margin-bottom:4px;">
        <span style="color:#e4e4e7;font-size:16px;font-weight:700;letter-spacing:-0.02em;">⬡ StackRadar</span>
      </div>
      <p style="margin:0;color:#71717a;font-size:13px;">Release digest</p>
    </div>

    <!-- Title -->
    <h1 style="margin:0 0 6px;color:#f4f4f5;font-size:22px;font-weight:700;letter-spacing:-0.03em;">
      {{count}} new release{{count_plural}}
    </h1>
    <p style="margin:0 0 24px;color:#71717a;font-size:13px;">
      New releases detected across your tracked repositories.
    </p>

    <div style="height:1px;background:#27272a;margin-bottom:24px;"></div>

    <!-- Release cards -->
    {{cards}}

    <!-- Footer -->
    <div style="margin-top:28px;padding-top:20px;border-top:1px solid #27272a;">
      <p style="margin:0;color:#52525b;font-size:11px;">
        Sent by StackRadar · You're receiving this because you're tracking releases.
      </p>
    </div>

  </div>
</body>
</html>
