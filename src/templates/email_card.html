<div style="background:{{bg}};border:1px solid {{border_alpha}};border-left:3px solid {{border}};border-radius:10px;padding:16px 20px;margin-bottom:12px;">

  <!-- Card header -->
  <div style="margin-bottom:8px;">
    <span style="color:#71717a;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;">{{repo_owner}}/</span><span style="color:#e4e4e7;font-size:13px;font-weight:600;">{{repo_name}}</span>
    <span style="color:#6b7280;font-size:12px;margin-left:6px;">{{tag}}</span>
    &nbsp;
    <span style="background:{{sev_color}}20;color:{{sev_color}};padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;">{{severity}}</span>
  </div>

  <!-- Summary -->
  <p style="margin:0 0 10px;color:#d4d4d8;font-size:13px;line-height:1.5;">{{summary}}</p>

  <!-- Key changes -->
  {{changes_block}}

  <!-- Link -->
  <div style="margin-top:12px;">
    <a href="{{url}}" style="color:#818cf8;font-size:12px;text-decoration:none;">View release →</a>
  </div>

</div>
